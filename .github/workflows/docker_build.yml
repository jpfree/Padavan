name: Padavan Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Docker image (no cache)
      run: docker build --no-cache -t padavan-docker .

    - name: Start container
      run: |
        docker run -d --name padavan \
          -v ${{ github.workspace }}:/opt/padavan \
          -w /opt/padavan/trunk \
          padavan-docker tail -f /dev/null

    - name: SSH into container
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
        ssh-command: docker exec -it padavan /bin/bash -l

    - name: Build firmware inside Docker
      run: |
        docker exec padavan bash -l -c "
          cd /opt/padavan/trunk &&
          fakeroot ./build_firmware_modify YK-L1
        "

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware-YK-L1
        path: trunk/images/*.trx
