name: Padavan Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build --no-cache -t padavan-docker .

    - name: Start container
      run: |
        docker run -d --name padavan \
          -v ${{ github.workspace }}/trunk:/opt/padavan/trunk \
          -w /opt/padavan/trunk \
          padavan-docker tail -f /dev/null

    - name: Build firmware
      run: |
        docker exec padavan bash -lc "
          cd /opt/padavan/trunk &&
          fakeroot ./build_firmware_modify YK-L1
        "

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: YK-L1-firmware
        path: trunk/images/*.trx
